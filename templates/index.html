<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Root</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: lightgray;
        margin: 0;
        padding: 0;
      }
      form {
        width: 400px;
        background-color: rebeccapurple;
        display: flex;
        flex-direction: column;
        justify-content: center;
        margin: 50px auto;
        padding: 20px;
        border-radius: 8px;
        background-color: lightblue;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }
      input[type="text"] {
        padding: 10px;
        border: none;
        border-radius: 5px;
        margin-bottom: 15px;
        font-size: 16px;
      }
      button {
        padding: 10px 20px;
        background-color: black;
        color:;
        border: 2px solid blue;
        border-radius: 25px;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.3s ease;
      }
      button:hover {
        background-color: red;
        color: #85b842;
      }
      .result {
        width: 400px;
        margin: 20px auto;
        text-align: center;
        font-size: 18px;
        color: #333;
      }
      .result p {
        margin: 5px 0;
      }
    </style>
  </head>
  <body>
    <form action="" method="POST">
      {% csrf_token %}
      <input type="text" name="full_url" placeholder="Enter the URL" />
      <button type="submit">Submit</button>
    </form>
    {% if full_url and short_url %}
    <div class="result">
      <p>
        <strong>Short URL:</strong>
        <a href="/{{ short_url }}/" target="_blank">
          http://127.0.0.1:8000/{{ short_url }}/
        </a>
      </p>
    </div>
    {% endif %}
  </body>
</html>
